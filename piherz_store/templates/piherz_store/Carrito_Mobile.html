{% load humanize %}  <div class="card shadow-sm border-0 p-4" style="border-radius: 10px;">
    <h5 class="fw-bold mb-4">Resumen de la orden</h5>
<div class="mobile-summary-card">
    <div class="text-center mb-3"><div style="width: 40px; height: 4px; background: #ccc; margin: auto; border-radius: 2px;"></div></div>
    <div class="d-flex justify-content-between mb-2">
        <span class="text-muted">Productos ({{ total_items }})</span>
        <span class="fw-bold">${{ total|floatformat:0|intcomma }}</span>
    </div>
    <div class="d-flex justify-content-between mb-4">
        <span class="fw-bold fs-4">Total:</span>
        <span class="fw-bold fs-4">${{ total|floatformat:0|intcomma }}</span>
    </div>
    <a href="#" class="btn btn-dark w-100 py-3" style="border-radius: 30px; font-size: 18px; font-weight: 600;">Continuar compra</a>
</div>
