{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piherz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
</head>
<body>

    <nav class="piherz-navbar">
        <div class="nav-wrapper">
            <a href="{% url 'index' %}" class="nav-logo">
              <img src="{% static 'img/Piherz-logo-azul.png' %}" alt="Logo" width="70">
            </a>

            <form id="search-form" action="{% url 'index' %}" method="get" class="nav-search d-flex align-items-center">
                <input id="search-input" type="search" name="q" class="form-control search-input" placeholder="Buscar productos..." value="{{ q|default:'' }}" autocomplete="off">
                <button type="submit" class="btn btn-link p-0 text-dark search-icon" aria-label="Buscar">
                    <i class="bi bi-search" aria-hidden="true"></i>
                </button>
            </form>

            <div class="nav-cart">
                <a href="{% url 'ver_carrito' %}" class="text-dark position-relative d-inline-block">
                    <i class="bi bi-cart3 fs-3"></i>
                    <span class="badge badge-piherz rounded-pill position-absolute top-0 start-100 translate-middle">
                      {{ request.session.carrito|length }}
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
<div class="modal fade" id="carritoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title d-flex align-items-center gap-2">
          <span class="badge bg-success rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
            <i class="bi bi-check-lg"></i>
          </span>
          Producto agregado a tu Carro
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex align-items-center">
            <img id="modal-img" src="" alt="Producto" style="width: 80px; height: 80px; object-fit: contain;" class="me-3">
            <div>
                <h5 id="modal-producto"></h5>
                <p id="modal-cantidad"></p>
                <p id="modal-precio"></p>
            </div>
        </div>
      </div>
      <div class="modal-footer border-0 justify-content-between">
        <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Seguir comprando</button>
        <a href="{% url 'ver_carrito' %}" class="btn btn-piherz">Ir al Carrito</a>
      </div>
    </div>
  </div>
</div>

<script>
function agregarAlCarrito(productoId, cantidad = 1, imagenUrl = '', productoNombre = '') {
    fetch(`/agregar-al-carrito/${productoId}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: new URLSearchParams({ cantidad })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            const badge = document.querySelector('.nav-cart .badge');
            if (badge) {
                badge.textContent = data.carrito_cantidad;
            }
            document.getElementById('modal-producto').innerText = productoNombre || data.producto;
            document.getElementById('modal-cantidad').innerText = `Cantidad: ${cantidad}`;
            document.getElementById('modal-precio').innerText = data.precio_formateado || data.precio;
            const modalImg = document.getElementById('modal-img');
            if (imagenUrl) {
                modalImg.src = imagenUrl;
            } else {
                modalImg.src = '{% static "img/piherz-logo.png" %}';
            }
            const myModal = new bootstrap.Modal(document.getElementById('carritoModal'));
            myModal.show();
        }
    })
    .catch(error => console.log('Error:', error));
}

document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const searchForm = document.getElementById('search-form');

    if (searchInput && searchForm) {
        searchInput.addEventListener('input', function() {
            if (this.value.trim() === '') {
                searchForm.submit();
            }
        });
    }
});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
