{% extends 'piherz_store/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Recuperar Contraseña</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-3">Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="id_email" name="email" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-piherz">Enviar Instrucciones</button>
                            <a href="{% url 'login' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
